unit_tests:
  - name: test_incident_attachments_composite_join
    description: "Verify incident_attachments correctly joins incidents to doc_metadata on composite key (has_attachments + reportee_id + channel + timestamp)"
    model: incident_attachments
    given:
      - input: ref('incidents')
        rows:
          - {incident_number: "INC-2025-001", has_attachments: true, reportee_id: "U001", external_source_id: "C001", created_at: "1737000001.000000"}
          - {incident_number: "INC-2025-002", has_attachments: true, reportee_id: "U002", external_source_id: "C001", created_at: "1737000002.000000"}
          - {incident_number: "INC-2025-004", has_attachments: false, reportee_id: "U002", external_source_id: "C001", created_at: "1737000005.000000"}
      - input: source('bronze_zone', 'doc_metadata')
        rows:
          - {file_id: "F001", channel_id: "C001", user_id: "U001", event_ts: "1737000001.000000", staged_file_path: "incidents/payment_error_screenshot.png"}
          - {file_id: "F002", channel_id: "C001", user_id: "U002", event_ts: "1737000002.000000", staged_file_path: "incidents/login_error_log.pdf"}
          - {file_id: "F099", channel_id: "C001", user_id: "U002", event_ts: "1737000005.000000", staged_file_path: "incidents/unrelated.pdf"}
    expect:
      rows:
        - {id: "F001", incident_number: "INC-2025-001", uploaded_at: "1737000001.000000"}
        - {id: "F002", incident_number: "INC-2025-002", uploaded_at: "1737000002.000000"}
