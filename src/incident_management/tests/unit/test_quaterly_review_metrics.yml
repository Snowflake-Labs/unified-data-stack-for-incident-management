unit_tests:
  - name: test_quaterly_review_metrics_json_flattening
    description: "Verify quaterly_review_metrics correctly extracts filename from path and flattens JSON response into metric/value rows"
    model: quaterly_review_metrics
    given:
      - input: ref('document_question_extracts')
        rows:
          - {relative_path: "qa/report_q1.pdf", size: 512000, last_modified: "2025-01-10 08:00:00", md5: "md5hash001", etag: "etag001", file_url: "snowflake://docs/qa/report_q1.pdf", doc_type: "question", extension: "pdf", question_extracts_json: '{"response":{"quarter":"Q1 2025","overall_uptime":"99.95%"},"error":null}'}
    expect:
      rows:
        - {filename: "report_q1.pdf", metric: "quarter", value: "Q1 2025"}
        - {filename: "report_q1.pdf", metric: "overall_uptime", value: "99.95%"}
